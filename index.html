<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jh Seller - Daily Rewards Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #f39c12; --bg: #fffbf2; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; text-align: center; color: var(--text); }
        .hidden { display: none !important; }
        
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        .btn-orange { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-green { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 25px; }
        .menu-item { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .icon-bg { width: 58px; height: 58px; background: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 5px 15px rgba(0,0,0,0.06); }

        .wallet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .stat-box-new { background: white; padding: 20px 10px; border-radius: 22px; box-shadow: 0 5px 20px rgba(0,0,0,0.04); display: flex; flex-direction: column; align-items: center; border: 1px solid #f9ebd2; }
        .stat-label-new { font-size: 10px; color: #888; font-weight: bold; text-transform: uppercase; margin-top: 8px; }

        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; padding-top: 20px; }
        .history-item { background: white; margin: 10px 15px; padding: 15px; border-radius: 15px; text-align: left; border-left: 5px solid #28a745; box-shadow: 0 3px 10px rgba(0,0,0,0.03); }
    </style>
</head>
<body>

    <div id="auth-section" class="card">
        <h2>Jh Seller Login</h2>
        <input type="email" id="email" style="width:90%; padding:12px; margin:10px 0;" placeholder="Email">
        <input type="password" id="password" style="width:90%; padding:12px; margin:10px 0;" placeholder="Password">
        <button class="btn-green" onclick="login()">Login</button>
    </div>

    <div id="main-dashboard" class="hidden">
        <div class="card">
            <p style="color: #888; font-size: 12px;">AVAILABLE BALANCE</p>
            <h1 id="userBalance" style="font-size: 38px;">0 PKR</h1>
            <button class="btn-orange" onclick="showWithdraw()">Withdraw Funds ➔</button>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="watchAd()"><div class="icon-bg">📊</div><span>Tasks</span></div>
            <div class="menu-item" onclick="showWallet()"><div class="icon-bg">👛</div><span>Wallet</span></div>
            <div class="menu-item" onclick="openRewards()"><div class="icon-bg">🎁</div><span>Rewards</span></div>
            <div class="menu-item" onclick="showSalary()"><div class="icon-bg">📈</div><span>Salary</span></div>
            <div class="menu-item" onclick="logout()"><div class="icon-bg">⚙️</div><span>Logout</span></div>
        </div>
    </div>

    <div id="wallet-page" class="full-page hidden">
        <div style="display:flex; align-items:center; padding: 0 20px;"><button onclick="closePage('wallet-page')" style="background:none; border:none; font-size:28px;">←</button><h2>My Wallet</h2></div>
        <div class="wallet-grid">
            <div class="stat-box-new"><span>💰</span><div class="stat-label-new">Available</div><div id="wBal" style="font-weight:bold; color:#28a745;">0 PKR</div></div>
            <div class="stat-box-new"><span>🏧</span><div class="stat-label-new">Withdrawn</div><div id="wOut" style="font-weight:bold; color:#e74c3c;">0 PKR</div></div>
            <div class="stat-box-new"><span>📺</span><div class="stat-label-new">Videos</div><div id="wVid" style="font-weight:bold;">0</div></div>
            <div class="stat-box-new"><span>🎁</span><div class="stat-label-new">Rewards</div><div id="wRew" style="font-weight:bold;">0 PKR</div></div>
        </div>
    </div>

    <div id="rewards-page" class="full-page hidden">
        <div style="display:flex; align-items:center; padding: 0 20px;"><button onclick="closePage('rewards-page')" style="background:none; border:none; font-size:28px;">←</button><h2>Daily Rewards</h2></div>
        <div class="card">
            <h3>Claim 300 PKR</h3>
            <p style="font-size:13px; color:#666;">You can claim this reward once every 24 hours.</p>
            <button id="claimBtn" class="btn-orange" onclick="claimDaily()">Claim Reward</button>
        </div>
        <h4 style="margin-top:20px;">Reward History</h4>
        <div id="reward-history"></div>
    </div>

    <div id="salary-page" class="full-page hidden">
        <div style="display:flex; align-items:center; padding: 0 20px;"><button onclick="closePage('salary-page')" style="background:none; border:none; font-size:28px;">←</button><h2>History</h2></div>
        <div id="salary-list"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8r-JkscDuet3gf33WhTgGxTdLMObCmc8",
            authDomain: "jkseller.firebaseapp.com",
            databaseURL: "https://jkseller-default-rtdb.firebaseio.com/",
            projectId: "jkseller",
            storageBucket: "jkseller.appspot.com",
            messagingSenderId: "410778583623",
            appId: "1:410778583623:web:8431529fc0b659414d2762"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value); }
        function logout() { auth.signOut().then(() => location.reload()); }
        function showWallet() { document.getElementById('wallet-page').classList.remove('hidden'); }
        function openRewards() { document.getElementById('rewards-page').classList.remove('hidden'); loadRewardHistory(); }
        function showSalary() { document.getElementById('salary-page').classList.remove('hidden'); }
        function closePage(id) { document.getElementById(id).classList.add('hidden'); }

        // Daily Reward Logic (300 PKR / 24 Hours)
        function claimDaily() {
            const u = auth.currentUser;
            const now = new Date().getTime();
            db.ref('users/' + u.uid).once('value', s => {
                const d = s.val() || {};
                const lastClaim = d.lastRewardTime || 0;
                
                if (now - lastClaim > 24 * 60 * 60 * 1000) { // 24 Hours check
                    const newBal = (d.balance || 0) + 300;
                    const newRew = (d.dailyRewardsTotal || 0) + 300;
                    
                    db.ref('users/' + u.uid).update({ 
                        balance: newBal, 
                        dailyRewardsTotal: newRew,
                        lastRewardTime: now 
                    });
                    
                    db.ref('reward_history/' + u.uid).push({
                        amount: 300,
                        date: new Date().toLocaleString(),
                        type: "Daily Reward"
                    });
                    
                    alert("Mubarak ho! 300 PKR claim ho gaye.");
                } else {
                    const hoursLeft = Math.ceil((24 * 60 * 60 * 1000 - (now - lastClaim)) / (1000 * 60 * 60));
                    alert(`Abhi wait karein! Agla reward ${hoursLeft} ghante baad milega.`);
                }
            });
        }

        function loadRewardHistory() {
            const list = document.getElementById('reward-history');
            db.ref('reward_history/' + auth.currentUser.uid).on('value', s => {
                list.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div class="history-item">💰 <b>${d.amount} PKR</b> Claimed<br><small>${d.date}</small></div>`;
                });
            });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                db.ref('users/' + user.uid).on('value', s => {
                    const d = s.val() || {};
                    document.getElementById('userBalance').innerText = (d.balance || 0) + " PKR";
                    document.getElementById('wBal').innerText = (d.balance || 0) + " PKR";
                    document.getElementById('wOut').innerText = (d.withdrawn || 0) + " PKR";
                    document.getElementById('wVid').innerText = (d.videosWatched || 0);
                    document.getElementById('wRew').innerText = (d.dailyRewardsTotal || 0) + " PKR";
                });
            }
        });
    </script>
</body>
</html>
