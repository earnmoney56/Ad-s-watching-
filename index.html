<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jh Seller - Final Fixed Login</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #f39c12; --bg: #fffbf2; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; text-align: center; color: var(--text); }
        .hidden { display: none !important; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }
        .btn-orange { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-green { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 25px; }
        .menu-item { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: #555; cursor: pointer; }
        .icon-bg { width: 58px; height: 58px; background: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 5px 15px rgba(0,0,0,0.06); }
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; padding-top: 20px; }
    </style>
</head>
<body>

    <div id="auth-section" class="card">
        <h2 id="auth-title">Jh Seller Login</h2>
        
        <div id="login-form">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-green" id="login-btn" onclick="login()">Login</button>
            <p onclick="showSignup()" style="cursor:pointer; color:var(--primary); margin-top:15px; font-weight:bold;">Naya account banayein (Signup)</p>
        </div>

        <div id="signup-form" class="hidden">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-password" placeholder="Create Password">
            <input type="text" id="reg-ref" placeholder="Referral Code (Optional)">
            <button class="btn-orange" id="signup-btn" onclick="signup()">Create Account</button>
            <p onclick="showLogin()" style="cursor:pointer; color:var(--primary); margin-top:15px; font-weight:bold;">Pehle se account hai? Login</p>
        </div>
    </div>

    <div id="main-dashboard" class="hidden">
        <div class="card">
            <p style="color: #888; font-size: 12px;">AVAILABLE BALANCE</p>
            <h1 id="userBalance" style="font-size: 38px;">0 PKR</h1>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="alert('Referral System Active!')"><div class="icon-bg">👥</div><span>Team</span></div>
            <div class="menu-item" onclick="logout()"><div class="icon-bg">⚙️</div><span>Logout</span></div>
        </div>
    </div>

    <script>
        // Double Check your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB8r-JkscDuet3gf33WhTgGxTdLMObCmc8",
            authDomain: "jkseller.firebaseapp.com",
            databaseURL: "https://jkseller-default-rtdb.firebaseio.com/",
            projectId: "jkseller",
            storageBucket: "jkseller.appspot.com",
            messagingSenderId: "410778583623",
            appId: "1:410778583623:web:8431529fc0b659414d2762"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // UI Switches
        function showSignup() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
            document.getElementById('auth-title').innerText = "Create Account";
        }

        function showLogin() {
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('auth-title').innerText = "Jh Seller Login";
        }

        // Login Logic
        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Email aur Password likhein!");

            auth.signInWithEmailAndPassword(e, p)
                .then(() => console.log("Login Success"))
                .catch(err => alert("Login Error: " + err.message));
        }

        // Signup Logic (The fix is here)
        function signup() {
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-password').value;
            const ref = document.getElementById('reg-ref').value.trim();

            if(!e || !p) return alert("Tamam fields fill karein!");
            if(p.length < 6) return alert("Password kam az kam 6 huroof ka hona chahiye!");

            auth.createUserWithEmailAndPassword(e, p)
                .then((userCredential) => {
                    const uid = userCredential.user.uid;
                    const myCode = uid.substring(0, 6).toUpperCase();

                    // Database mein data save karna
                    db.ref('users/' + uid).set({
                        email: e,
                        balance: 0,
                        myRefCode: myCode,
                        refBy: ref || "none"
                    }).then(() => {
                        // Agar referral code use hua hai toh reward dena
                        if(ref !== "" && ref !== "none") {
                            giveReferralReward(ref, e);
                        }
                        alert("Account ban gaya!");
                    });
                })
                .catch(err => alert("Signup Error: " + err.message));
        }

        function giveReferralReward(code, newMemberEmail) {
            db.ref('users').orderByChild('myRefCode').equalTo(code).once('value', snapshot => {
                if(snapshot.exists()) {
                    snapshot.forEach(child => {
                        const parentUid = child.key;
                        const currentBal = child.val().balance || 0;
                        db.ref('users/' + parentUid).update({ balance: currentBal + 700 });
                        db.ref('team/' + parentUid).push({ member: newMemberEmail, date: new Date().toLocaleDateString() });
                    });
                }
            });
        }

        // Auth Observer
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                db.ref('users/' + user.uid).on('value', s => {
                    const d = s.val() || {};
                    document.getElementById('userBalance').innerText = (d.balance || 0) + " PKR";
                });
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-dashboard').classList.add('hidden');
            }
        });

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
