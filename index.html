<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jh Seller Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdf8f3; margin: 0; padding: 20px; text-align: center; }
        .main-card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 350px; margin: auto; border: 1px solid #eee; }
        .balance-label { color: #bca08d; font-weight: bold; letter-spacing: 1px; font-size: 14px; margin-top: 10px; }
        .balance-amount { font-size: 50px; color: #6e5444; margin: 15px 0; font-weight: bold; }
        .btn-withdraw { background: #f39200; color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .menu-grid { display: flex; justify-content: space-around; max-width: 350px; margin: 30px auto; }
        .menu-item { background: white; padding: 15px 10px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); font-size: 12px; cursor: pointer; width: 70px; border: 1px solid #f9f9f9; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="balance-label">💳 AVAILABLE BALANCE</div>
    <div class="balance-amount">RS <span id="userBalance">0.00</span></div>
    <button class="btn-withdraw" onclick="withdraw()">Withdraw Funds →</button>
</div>

<div class="menu-grid">
    <div class="menu-item" onclick="doTask()">📊<br>Tasks</div>
    <div class="menu-item" onclick="alert('Wallet Empty')">👛<br>Wallet</div>
    <div class="menu-item" onclick="alert('No Rewards')">🎁<br>Rewards</div>
    <div class="menu-item" onclick="alert('Salary: RS 0')">📈<br>Salary</div>
</div>

<script>
    // Aapka Correct Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyC7z-L...", // Screenshot
        authDomain: "jh-seller-3b8e7.firebaseapp.com",
        databaseURL: "https://jh-seller-3b8e7-default-rtdb.firebaseio.com",
        projectId: "jh-seller-3b8e7",
        storageBucket: "jh-seller-3b8e7.appspot.com",
        messagingSenderId: "367123565013",
        appId: "1:367123565013:web:75304918e7c10b71946001"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Database se balance uthana
    db.ref('users/test_user/balance').on('value', (snapshot) => {
        const val = snapshot.val();
        if (val !== null) {
            document.getElementById('userBalance').innerText = val.toFixed(2);
        } else {
            // Agar pehli baar hai toh 0 set kar dein
            db.ref('users/test_user').set({ balance: 0.00 });
        }
    });

    // 2. Button dabane par balance barhana
    function doTask() {
        let currentBalance = parseFloat(document.getElementById('userBalance').innerText);
        let newBalance = currentBalance + 50.00;
        
        // Database update karein
        db.ref('users/test_user').update({
            balance: newBalance
        }).then(() => {
            alert("Task Completed! RS 50.00 added to your account.");
        }).catch((error) => {
            alert("Error: Database connect nahi hui. Check Rules!");
        });
    }

    function withdraw() {
        alert("Minimum withdraw RS 500 hai.");
    }
</script>

</body>
</html>
