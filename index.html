<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jh Seller - Pro Earning App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        .hidden { display: none; }
        #userBalance { font-size: 24px; color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-section" class="card">
        <h2>Jh Seller Login</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="login-error" style="color: red; font-size: 12px;"></p>
    </div>

 <div id="main-dashboard" class="card hidden">
        <h2>Welcome to Dashboard</h2>
        <p>Current Balance</p>
        <div id="userBalance">0 PKR</div>
        <hr>
        <button onclick="watchAd()" style="background: #007bff; margin-bottom: 10px;">Watch Ad (Earn 5 PKR)</button>
        <button onclick="logout()" style="background: #dc3545;">Logout</button>
    </div>
    
    <script>
        // 1. Firebase Configuration (Nayi API Key aur URL ke sath)
        const firebaseConfig = {
            apiKey: "AIzaSyB8r-JkscDuet3gf33WhTgGxTdLMObCmc8",
            authDomain: "jkseller.firebaseapp.com",
            databaseURL: "https://jkseller-default-rtdb.firebaseio.com/",
            projectId: "jkseller",
            storageBucket: "jkseller.appspot.com",
            messagingSenderId: "410778583623",
            appId: "1:410778583623:web:8431529fc0b659414d2762"
        };

        // 2. Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 3. Login Function
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorElement = document.getElementById('login-error');

            if(email === "" || pass === "") {
                errorElement.innerText = "Please fill all fields.";
                return;
            }

            auth.signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                console.log("Logged In!");
            })
            .catch((error) => {
                errorElement.innerText = error.message;
            });
        }

        // 4. Auth State (Check if user is logged in)
        auth.onAuthStateChanged(user => {
            if (user) {
                showScreen('main-dashboard');
                // Fetch Balance from Database
                db.ref('users/' + user.uid + '/balance').on('value', (snap) => {
                    const balance = snap.val() || 0;
                    document.getElementById('userBalance').innerText = balance + " PKR";
                });
            } else {
                showScreen('auth-section');
            }
        });

        // 5. Logout Function
        function logout() {
            auth.signOut();
        }

        // 6. Utility Function to switch screens
        function showScreen(screenId) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }
    </script>
</body>
</html>
