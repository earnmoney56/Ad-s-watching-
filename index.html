<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jh Seller - Pro Earning App</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #f39c12; --bg: #fffbf2; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; text-align: center; color: var(--text); }
        .hidden { display: none !important; }
        
        /* Main UI Elements */
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        input, select { width: 92%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; }
        .btn-orange { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-green { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Dashboard Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 25px; }
        .menu-item { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: #555; cursor: pointer; }
        .icon-bg { width: 58px; height: 58px; background: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 5px 15px rgba(0,0,0,0.06); }

        /* Full Page View (Tasks, Wallet, Salary) */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; padding-top: 20px; }
        .history-item { background: white; margin: 10px 15px; padding: 15px; border-radius: 15px; text-align: left; border-left: 5px solid var(--primary); box-shadow: 0 3px 10px rgba(0,0,0,0.03); }
        
        /* Video Container on Task Page */
        .video-box { background: #000; border-radius: 20px; overflow: hidden; margin: 20px; position: relative; }
        .timer-badge { background: var(--primary); color: white; padding: 10px 20px; border-radius: 50px; font-size: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

    <div id="auth-section" class="card">
        <h2>Jh Seller Login</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-green" onclick="login()">Login</button>
    </div>

    <div id="main-dashboard" class="hidden">
        <div class="card">
            <p style="color: #888; font-size: 12px;">AVAILABLE BALANCE</p>
            <h1 id="userBalance" style="font-size: 38px;">0 PKR</h1>
            <button class="btn-orange" onclick="showWithdrawModal()">Withdraw Funds ➔</button>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="openTasks()"><div class="icon-bg">📊</div><span>Tasks</span></div>
            <div class="menu-item" onclick="showPage('wallet-page')"><div class="icon-bg">👛</div><span>Wallet</span></div>
            <div class="menu-item" onclick="showRewards()"><div class="icon-bg">🎁</div><span>Rewards</span></div>
            <div class="menu-item" onclick="showSalary()"><div class="icon-bg">📈</div><span>Salary</span></div>
            <div class="menu-item"><div class="icon-bg">👥</div><span>Team</span></div>
            <div class="menu-item"><div class="icon-bg">🏆</div><span>Levels</span></div>
            <div class="menu-item" onclick="window.location.href='https://wa.me/YOURNUMBER'"><div class="icon-bg">🌐</div><span>Support</span></div>
            <div class="menu-item" onclick="logout()"><div class="icon-bg">⚙️</div><span>Logout</span></div>
        </div>
    </div>

    <div id="task-page" class="full-page hidden">
        <div style="display:flex; align-items:center; padding: 0 20px;">
            <button onclick="closeTasks()" style="background:none; border:none; font-size:28px; cursor:pointer;">←</button>
            <h2 style="margin-left: 20px;">Daily Video Tasks</h2>
        </div>
        
        <div id="task-content">
            <div class="timer-badge" id="task-timer">20</div>
            <div class="video-box">
                <iframe id="task-video" width="100%" height="220" src="" frameborder="0" allow="autoplay"></iframe>
            </div>
            <p id="task-status">Watch video for 20 seconds to earn 50 PKR</p>
        </div>
    </div>

    <div id="salary-page" class="full-page hidden">
        <div style="display:flex; align-items:center; padding: 0 20px;">
            <button onclick="closePage('salary-page')" style="background:none; border:none; font-size:28px; cursor:pointer;">←</button>
            <h2 style="margin-left: 20px;">Withdrawal History</h2>
        </div>
        <div id="salary-list"></div>
    </div>

    <div id="wallet-page" class="full-page hidden">
        <div style="display:flex; align-items:center; padding: 0 20px;">
            <button onclick="closePage('wallet-page')" style="background:none; border:none; font-size:28px; cursor:pointer;">←</button>
            <h2 style="margin-left: 20px;">My Wallet</h2>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:15px;">
            <div class="card" style="margin:0; padding:15px;">💰<br><small>Balance</small><br><b id="wBal">0</b></div>
            <div class="card" style="margin:0; padding:15px;">🏧<br><small>Withdrawn</small><br><b id="wOut">0</b></div>
            <div class="card" style="margin:0; padding:15px;">📺<br><small>Videos</small><br><b id="wVid">0</b></div>
            <div class="card" style="margin:0; padding:15px;">🎁<br><small>Rewards</small><br><b id="wRew">0</b></div>
        </div>
    </div>

    <div id="withdraw-modal" class="overlay hidden">
        <div class="card" style="width:80%; color:black;">
            <h3>Withdraw</h3>
            <select id="wMethod"><option>Easypaisa</option><option>JazzCash</option></select>
            <input type="text" id="wAcc" placeholder="Account Number">
            <input type="number" id="wAmt" placeholder="Amount (Min 500)">
            <button class="btn-green" onclick="submitWithdraw()">Submit</button>
            <button onclick="hideWithdraw()" style="color:red; background:none; border:none; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8r-JkscDuet3gf33WhTgGxTdLMObCmc8",
            authDomain: "jkseller.firebaseapp.com",
            databaseURL: "https://jkseller-default-rtdb.firebaseio.com/",
            projectId: "jkseller",
            storageBucket: "jkseller.appspot.com",
            messagingSenderId: "410778583623",
            appId: "1:410778583623:web:8431529fc0b659414d2762"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value); }
        function logout() { auth.signOut().then(() => location.reload()); }
        function showPage(id) { document.getElementById(id).classList.remove('hidden'); }
        function closePage(id) { document.getElementById(id).classList.add('hidden'); }
        function showWithdrawModal() { document.getElementById('withdraw-modal').classList.remove('hidden'); }
        function hideWithdraw() { document.getElementById('withdraw-modal').classList.add('hidden'); }

        // TASK PAGE LOGIC
        let taskTimerInterval;
        function openTasks() {
            showPage('task-page');
            const video = document.getElementById('task-video');
            const timerDisplay = document.getElementById('task-timer');
            let timeLeft = 20;
            
            timerDisplay.innerText = timeLeft;
            video.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1";
            
            taskTimerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(taskTimerInterval);
                    const u = auth.currentUser;
                    db.ref('users/' + u.uid).once('value', s => {
                        const d = s.val() || {};
                        db.ref('users/' + u.uid).update({ 
                            balance: (d.balance || 0) + 50, 
                            videosWatched: (d.videosWatched || 0) + 1 
                        });
                    });
                    alert("Reward Added: 50 PKR");
                    closeTasks();
                }
            }, 1000);
        }

        function closeTasks() {
            clearInterval(taskTimerInterval);
            document.getElementById('task-video').src = "";
            closePage('task-page');
        }

        function showSalary() {
            showPage('salary-page');
            const list = document.getElementById('salary-list');
            db.ref('withdrawals').orderByChild('uid').equalTo(auth.currentUser.uid).on('value', s => {
                list.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div class="history-item">
                        <b>${d.amount} PKR</b> - ${d.method}<br>
                        Status: <span style="color:${d.status=='Pending'?'#f39c12':'#28a745'}">${d.status}</span><br>
                        <small>${d.date}</small>
                    </div>`;
                });
            });
        }

        function submitWithdraw() {
            const u = auth.currentUser;
            const amt = parseInt(document.getElementById('wAmt').value);
            if (amt < 500) return alert("Min 500 PKR");
            db.ref('users/' + u.uid).once('value', s => {
                const d = s.val() || {};
                if (d.balance >= amt) {
                    db.ref('users/' + u.uid).update({ balance: d.balance - amt, withdrawn: (d.withdrawn || 0) + amt });
                    db.ref('withdrawals').push({ uid: u.uid, amount: amt, method: document.getElementById('wMethod').value, account: document.getElementById('wAcc').value, status: "Pending", date: new Date().toLocaleDateString() });
                    alert("Requested!"); hideWithdraw();
                } else { alert("Insufficient balance!"); }
            });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                db.ref('users/' + user.uid).on('value', s => {
                    const d = s.val() || {};
                    document.getElementById('userBalance').innerText = (d.balance || 0) + " PKR";
                    document.getElementById('wBal').innerText = (d.balance || 0) + " PKR";
                    document.getElementById('wOut').innerText = (d.withdrawn || 0) + " PKR";
                    document.getElementById('wVid').innerText = (d.videosWatched || 0);
                    document.getElementById('wRew').innerText = (d.dailyRewardsTotal || 0) + " PKR";
                });
            }
        });
    </script>
</body>
</html>
