<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jh Seller - Pro Earning App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        .hidden { display: none; }
        #userBalance { font-size: 24px; color: #28a745; font-weight: bold; 
                      
.dashboard-container { max-width: 450px; margin: auto; padding: 10px; }
.profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.user-info { display: flex; align-items: center; gap: 10px; }
.logo-img { border-radius: 50%; width: 50px; height: 50px; }
.balance-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
.stats-row { display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
.menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
.menu-item { text-align: center; font-size: 12px; cursor: pointer; }
.icon-bg { background: #fff; padding: 15px; border-radius: 12px; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 5px; }
.withdraw-main-btn { width: 100%; background: #f39c12; color: white; border: none; padding: 10px; border-radius: 10px; margin-top: 15px; font-weight: bold; }

    </style>
</head>
<body>

    <div id="auth-section" class="card">
        <h2>Jh Seller Login</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="login-error" style="color: red; font-size: 12px;"></p>
    </div>

 <div id="main-dashboard" class="dashboard-container hidden">
    <div class="profile-header">
        <div class="user-info">
            <img src="https://via.placeholder.com/50" alt="Logo" class="logo-img">
            <div class="user-text">
                <span class="user-name">Networker</span>
                <span class="status-dot"></span>
            </div>
        </div>
        <button class="notif-btn">🔔</button>
    </div>

    <div class="balance-card">
        <p class="balance-label">💳 AVAILABLE BALANCE</p>
        <h1 id="userBalance">$0</h1>
        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-icon">👑</span>
                <div class="stat-txt"><span>LEVEL</span><strong>8</strong></div>
            </div>
            <div class="stat-box">
                <span class="stat-icon">📥</span>
                <div class="stat-txt"><span>WITHDRAWN</span><strong>$877.281</strong></div>
            </div>
        </div>
        <button class="withdraw-main-btn" onclick="showWithdraw()">Withdraw Funds ➔</button>
    </div>

    <p class="section-title">Quick Actions ➔</p>

    <div class="menu-grid">
        <div class="menu-item" onclick="watchAd()">
            <div class="icon-bg task-bg">📊</div>
            <span>Tasks</span>
        </div>
        <div class="menu-item">
            <div class="icon-bg wallet-bg">👛</div>
            <span>Wallet</span>
        </div>
        <div class="menu-item">
            <div class="icon-bg reward-bg">🎁</div>
            <span>Rewards</span>
        </div>
        <div class="menu-item">
            <div class="icon-bg salary-bg">📈</div>
            <span>Salary</span>
        </div>
        <div class="menu-item">
            <div class="icon-bg team-bg">👥</div>
            <span>Team</span>
        </div>
        <div class="menu-item">
            <div class="icon-bg level-bg">🏆</div>
            <span>Levels</span>
        </div>
        <div class="menu-item">
            <div class="icon-bg support-bg">🌐</div>
            <span>Support</span>
        </div>
        <div class="menu-item" onclick="logout()">
            <div class="icon-bg settings-bg">⚙️</div>
            <span>Logout</span>
        </div>
    </div>
</div>
    
    <script>
        // 1. Firebase Configuration (Nayi API Key aur URL ke sath)
        const firebaseConfig = {
            apiKey: "AIzaSyB8r-JkscDuet3gf33WhTgGxTdLMObCmc8",
            authDomain: "jkseller.firebaseapp.com",
            databaseURL: "https://jkseller-default-rtdb.firebaseio.com/",
            projectId: "jkseller",
            storageBucket: "jkseller.appspot.com",
            messagingSenderId: "410778583623",
            appId: "1:410778583623:web:8431529fc0b659414d2762"
        };

        // 2. Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 3. Login Function
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorElement = document.getElementById('login-error');

            if(email === "" || pass === "") {
                errorElement.innerText = "Please fill all fields.";
                return;
            }

            auth.signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                console.log("Logged In!");
            })
            .catch((error) => {
                errorElement.innerText = error.message;
            });
        }

        // 4. Auth State (Check if user is logged in)
        auth.onAuthStateChanged(user => {
            if (user) {
                showScreen('main-dashboard');
                // Fetch Balance from Database
                db.ref('users/' + user.uid + '/balance').on('value', (snap) => {
                    const balance = snap.val() || 0;
                    document.getElementById('userBalance').innerText = balance + " PKR";
                });
            } else {
                showScreen('auth-section');
            }
        });

        // 5. Logout Function
        function logout() {
            auth.signOut();
        }

        // 6. Utility Function to switch screens
        function showScreen(screenId) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }
    </script>
</body>
</html>
