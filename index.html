<div id="rewards-page" class="full-page hidden">
        <div style="display:flex; align-items:center; padding: 0 20px;"><button onclick="closePage('rewards-page')" style="background:none; border:none; font-size:28px;">←</button><h2>Daily Rewards</h2></div>
        <div class="card">
            <div style="font-size: 50px;">🎁</div>
            <h3>Daily Bonus: 300 PKR</h3>
            <p>Har 24 ghante baad aap apna reward claim kar sakte hain.</p>
            <button class="btn-orange" id="claim-btn" onclick="claimDailyReward()">Claim Now</button>
            <p id="reward-status" style="margin-top:10px; color: #888;"></p>
        </div>
    </div>

    <div id="salary-page" class="full-page hidden">
        <div style="display:flex; align-items:center; padding: 0 20px;"><button onclick="closePage('salary-page')" style="background:none; border:none; font-size:28px;">←</button><h2>Earning History</h2></div>
        <div id="history-list">
            </div>
    </div>

<script>
    // ... (Firebase config aur baaki functions wahi rakhein) ...

    // --- REWARDS LOGIC ---
    function showRewards() {
        showPage('rewards-page');
        updateRewardUI();
    }

    function updateRewardUI() {
        const u = auth.currentUser;
        db.ref('users/' + u.uid).once('value', s => {
            const last = s.val().lastReward || 0;
            const now = new Date().getTime();
            if (now - last < 86400000) {
                document.getElementById('claim-btn').disabled = true;
                document.getElementById('claim-btn').style.background = "#ccc";
                document.getElementById('reward-status').innerText = "Already claimed! Come back tomorrow.";
            } else {
                document.getElementById('claim-btn').disabled = false;
                document.getElementById('claim-btn').style.background = "var(--primary)";
                document.getElementById('reward-status').innerText = "Reward is ready!";
            }
        });
    }

    function claimDailyReward() {
        const u = auth.currentUser;
        const now = new Date().getTime();
        
        db.ref('users/' + u.uid).child('balance').transaction(b => (b || 0) + 300);
        db.ref('users/' + u.uid).update({ lastReward: now });
        
        // History mein record add karna
        db.ref('history/' + u.uid).push({
            type: "Daily Reward",
            amount: 300,
            date: new Date().toLocaleString()
        });

        alert("300 PKR Added to your wallet!");
        updateRewardUI();
    }

    // --- HISTORY (SALARY) LOGIC ---
    function showSalary() {
        showPage('salary-page');
        const u = auth.currentUser;
        db.ref('history/' + u.uid).on('value', s => {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            if(!s.exists()) {
                list.innerHTML = "<p>No history found yet.</p>";
                return;
            }
            s.forEach(item => {
                const h = item.val();
                list.innerHTML += `
                    <div class="history-item">
                        <div style="display:flex; justify-content:space-between;">
                            <b>${h.type}</b>
                            <span style="color:green;">+${h.amount} PKR</span>
                        </div>
                        <small style="color:#888;">${h.date}</small>
                    </div>`;
            });
        });
    }

    // Task complete hone par bhi history mein entry add karein
    // (Aapke openTasks function ke timer khatam hone wali jagah ye line add karein):

        type: "Video Task",
        amount: 50,
        date: new Date().toLocaleString()
    });
    */
</script>
