<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jh Seller Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdf8f3; margin: 0; padding: 20px; text-align: center; }
        .main-card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 350px; margin: auto; border: 1px solid #eee; }
        .balance-amount { font-size: 50px; color: #6e5444; margin: 15px 0; font-weight: bold; }
        .btn-withdraw { background: #f39200; color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .menu-grid { display: flex; justify-content: space-around; max-width: 350px; margin: 30px auto; }
        .menu-item { background: white; padding: 15px 10px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); font-size: 12px; cursor: pointer; width: 70px; border: 1px solid #f9f9f9; }
    </style>
</head>
<body>

<div class="main-card">
    <div style="color: #bca08d; font-weight: bold;">💳 AVAILABLE BALANCE</div>
    <div class="balance-amount">RS <span id="userBalance">0.00</span></div>
    <button class="btn-withdraw" onclick="withdraw()">Withdraw Funds →</button>
</div>

<div class="menu-grid">
    <div class="menu-item" onclick="doTask()">📊<br>Tasks</div>
    <div class="menu-item" onclick="showWallet()">👛<br>Wallet</div>
    <div class="menu-item" onclick="alert('Rewards soon!')">🎁<br>Rewards</div>
    <div class="menu-item" onclick="alert('Salary: RS 0')">📈<br>Salary</div>
</div>

<script>
    // Aapka Naya Correct Config
    const firebaseConfig = {
        apiKey: "AIzaSyCPBngHWoQ6CWylLLC6cDFZA8hsR8-K7mY",
        authDomain: "jkseller.firebaseapp.com",
        databaseURL: "https://jkseller-default-rtdb.firebaseio.com",
        projectId: "jkseller",
        storageBucket: "jkseller.appspot.com",
        messagingSenderId: "410778583623",
        appId: "1:410778583623:web:8431529fc0b659414d2762"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Refresh par 0 na ho is liye local storage
    let localBal = localStorage.getItem('jh_balance') || "0.00";
    document.getElementById('userBalance').innerText = localBal;

    // Database se balance sync karein
    db.ref('users/test_user/balance').on('value', (snapshot) => {
        if (snapshot.exists()) {
            let bal = snapshot.val().toFixed(2);
            document.getElementById('userBalance').innerText = bal;
            localStorage.setItem('jh_balance', bal);
        }
    });

    function doTask() {
        let current = parseFloat(document.getElementById('userBalance').innerText);
        let updated = current + 50.00;
        
        db.ref('users/test_user').update({ balance: updated }).then(() => {
            alert("RS 50 Added!");
        }).catch(err => alert("Rules True karein!"));
    }

    function showWallet() {
        let bal = document.getElementById('userBalance').innerText;
        alert("Wallet Balance: RS " + bal);
    }

    function withdraw() {
        alert("Minimum Withdraw RS 500 hai.");
    }
</script>
</body>
</html>
