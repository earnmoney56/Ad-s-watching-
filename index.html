<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earning App</title>
    <style>
        body { font-family: sans-serif; background: #FFF9F2; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #FFE0B2; }
        .balance-amount { font-size: 48px; color: #8D6E63; margin: 15px 0; font-weight: bold; }
        .withdraw-btn { background: linear-gradient(135deg, #FF9800, #F57C00); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 30px; }
        .grid-item { background: white; padding: 15px; border-radius: 15px; text-align: center; font-size: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); }
        
        #withdrawModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 80%; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="card">
        <div style="color: #A1887F;">💳 AVAILABLE BALANCE</div>
        <div class="balance-amount">$0.00</div>
        <button class="withdraw-btn" onclick="document.getElementById('withdrawModal').style.display='flex'">Withdraw Funds →</button>
    </div>

    <div class="grid">
        <div class="grid-item">📊<br>Tasks</div>
        <div class="grid-item">👛<br>Wallet</div>
        <div class="grid-item">🎁<br>Rewards</div>
        <div class="grid-item">📈<br>Salary</div>
    </div>

    <div id="withdrawModal">
        <div class="modal-content">
            <h3>Withdraw</h3>
            <select><option>JazzCash</option><option>EasyPaisa</option></select>
            <input type="text" placeholder="Account Number">
            <input type="number" placeholder="Amount">
            <button class="withdraw-btn" onclick="alert('Request Sent!')">Submit</button>
            <button onclick="document.getElementById('withdrawModal').style.display='none'" style="background:none; border:none; color:red; margin-top:10px;">Cancel</button>
        </div>
    </div>
</body>
</html>
